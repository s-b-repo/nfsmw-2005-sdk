name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: codegen-check + cross-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install MinGW-w64 (i686) + CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 g++-mingw-w64-i686 cmake

      - name: codegen.py --check (generated headers must be committed up to date)
        run: python3 tools/codegen.py --check

      - name: Host unit tests (bChunk + AOB scanner logic)
        run: python3 tests/host_tests.py

      - name: Configure (MinGW i686 cross toolchain)
        run: >
          cmake -S . -B build
          -DCMAKE_TOOLCHAIN_FILE=cmake/nfsmw-toolchain-mingw-i686.cmake

      - name: Build all example mods (default = MinHook backend)
        run: cmake --build build -j

      - name: Build with the simple hook backend (fallback path)
        run: |
          set -e
          cmake -S . -B build_simple -DNFSMW_HOOKS_BACKEND=simple \
            -DCMAKE_TOOLCHAIN_FILE=cmake/nfsmw-toolchain-mingw-i686.cmake
          cmake --build build_simple --target infinite_nos inline_hook -j

      - name: Verify artifacts are 32-bit Win32 DLLs
        run: |
          set -e
          for dll in build/examples/*.dll; do
            file "$dll"
            file "$dll" | grep -qE "Intel (i386|80386)" || { echo "NOT i386: $dll"; exit 1; }
          done
          ls build/examples/*.asi >/dev/null

      - name: Install + find_package smoke test
        run: |
          set -e
          cmake -S . -B ib -DNFSMW_BUILD_EXAMPLES=OFF \
            -DCMAKE_TOOLCHAIN_FILE=cmake/nfsmw-toolchain-mingw-i686.cmake \
            -DCMAKE_INSTALL_PREFIX=$PWD/_prefix
          cmake --build ib --target install
          test -f _prefix/lib/cmake/nfsmw_sdk/nfsmw_sdkConfig.cmake
          test -f _prefix/share/nfsmw_sdk/src/entry.c

      - name: Downstream find_package consumer build
        run: |
          set -e
          mkdir -p /tmp/consumer
          cat > /tmp/consumer/mod.cpp <<'EOF'
          #include <nfsmw_sdk/nfsmw_sdk.h>
          NFSMW_PLUGIN_DECLARE("CI Consumer", "1.0.0", "ci")
          NFSMW_PLUGIN_MAIN() { *nfsmw::Tweak_InfiniteNOS() = true; return NFSMW_OK; }
          EOF
          cat > /tmp/consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(ci_consumer LANGUAGES C CXX)
          find_package(nfsmw_sdk CONFIG REQUIRED)
          nfsmw_add_plugin(ci_consumer SOURCES mod.cpp)
          EOF
          cmake -S /tmp/consumer -B /tmp/consumer/b \
            -DCMAKE_TOOLCHAIN_FILE=$PWD/cmake/nfsmw-toolchain-mingw-i686.cmake \
            -Dnfsmw_sdk_DIR=$PWD/_prefix/lib/cmake/nfsmw_sdk
          cmake --build /tmp/consumer/b
          file /tmp/consumer/b/ci_consumer.dll | grep -qE "Intel (i386|80386)"
          test -f /tmp/consumer/b/ci_consumer.asi

  cpp14:
    name: C++14 compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install MinGW-w64 (i686)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-i686
      - name: Build an example at -std=c++14
        run: >
          i686-w64-mingw32-g++ -std=c++14 -m32 -Os -shared
          -static -static-libgcc -static-libstdc++ -Wl,--kill-at
          -Iinclude
          examples/infinite_nos/main.cpp src/entry.c
          -o /tmp/infinite_nos.dll
